openapi: 3.0.3

info:
  title: Гончарная мастерская API — Slots
  description: >-
    Просмотр слотов расписания (read-only проекция) с фильтрами и пагинацией.
    Часть клиентского API для мобильного приложения мастерской.
  version: 1.0.0

servers:
  - url: https://api.pottery.example/v1
    description: Production — продакшен-окружение
  - url: https://staging-api.pottery.example/v1
    description: Staging — тестовое окружение

tags:
  - name: Slots
    description: Слоты/расписание, read-only

security:
  - bearerAuth: []

paths:
  /slots:
    get:
      tags:
        - Slots
      summary: Список слотов с фильтрами
      operationId: listSlots
      description: >-
        Возвращает занятия с фильтрами и пагинацией. По умолчанию показываются
        слоты на ближайшие 7 дней.
      parameters:
        - $ref: '../common/models.yaml#/components/parameters/DateFromParam'
        - $ref: '../common/models.yaml#/components/parameters/DateToParam'
        - $ref: '../common/models.yaml#/components/parameters/RouteTypeParam'
        - $ref: '../common/models.yaml#/components/parameters/InstructorIdParam'
        - $ref: '../common/models.yaml#/components/parameters/OnlyAvailableParam'
        - $ref: '../common/models.yaml#/components/parameters/LimitParam'
        - $ref: '../common/models.yaml#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Список слотов
          content:
            application/json:
              schema:
                $ref: 'models.yaml#/components/schemas/SlotListResponse'
        '400':
          $ref: '../common/models.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'

  /slots/{slotId}:
    get:
      tags:
        - Slots
      summary: Карточка слота
      operationId: getSlot
      description: Полные данные слота для карточки, включая маршрут и точку встречи.
      parameters:
        - $ref: '../common/models.yaml#/components/parameters/SlotIdParam'
      responses:
        '200':
          description: Данные слота
          content:
            application/json:
              schema:
                $ref: 'models.yaml#/components/schemas/Slot'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../common/models.yaml#/components/responses/NotFound'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      $ref: '../auth/models.yaml#/components/securitySchemes/bearerAuth'