# Аутентификация: схема безопасности и DTO потока OTP.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access-токен, выдаётся после POST /auth/verify-code.

  schemas:
    RequestCodeRequest:
      type: object
      description: Запрос на отправку OTP-кода на номер телефона.
      required:
        - phone
      properties:
        phone:
          type: string
          description: Номер телефона в формате E.164.
          pattern: '^\+[1-9]\d{1,14}$'
          example: '+79991234567'

    RequestCodeResponse:
      type: object
      description: Ответ на запрос OTP-кода.
      required:
        - ttl_seconds
        - resend_after_seconds
      properties:
        ttl_seconds:
          type: integer
          description: Срок жизни кода в секундах.
          example: 300
        resend_after_seconds:
          type: integer
          description: Через сколько секунд можно запросить повторную отправку.
          example: 60

    TokenPair:
      type: object
      description: Пара JWT-токенов сессии.
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: JWT access-токен.
        refresh_token:
          type: string
          description: Refresh-токен для обновления сессии через POST /auth/refresh.
        token_type:
          type: string
          description: Тип токена.
          enum:
            - Bearer
          example: Bearer
        expires_in:
          type: integer
          description: Срок жизни access-токена в секундах.
          example: 900

    RefreshTokenRequest:
      type: object
      description: Запрос на обновление сессии по refresh-токену.
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Действительный refresh-токен.

    VerifyCodeRequest:
      type: object
      description: Подтверждение OTP-кода и вход/регистрация.
      required:
        - phone
        - code
      properties:
        phone:
          type: string
          description: Номер телефона в формате E.164.
          pattern: '^\+[1-9]\d{1,14}$'
          example: '+79991234567'
        code:
          type: string
          description: OTP-код из SMS (4–6 цифр).
          pattern: '^\d{4,6}$'
          example: '1234'
        name:
          type: string
          description: Имя клиента. Передаётся при первичной регистрации, если профиль ещё не заполнен.
          minLength: 1
          maxLength: 100
          example: Иван

    VerifyCodeResponse:
      type: object
      description: Ответ на подтверждение кода — пара токенов сессии и данные клиента.
      required:
        - tokens
        - client
        - is_new
      properties:
        tokens:
          $ref: '#/components/schemas/TokenPair'
        client:
          $ref: '../profile/models.yaml#/components/schemas/Client'
        is_new:
          type: boolean
          description: true, если клиент только что зарегистрирован.

    PushTokenRequest:
      type: object
      description: Регистрация push-токена устройства для напоминаний.
      required:
        - token
        - platform
      properties:
        token:
          type: string
          description: Токен push-уведомлений, выданный платформой.
        platform:
          type: string
          description: Платформа устройства.
          enum:
            - ios
            - android
          example: ios

    PushTokenDeleteRequest:
      type: object
      description: Снятие регистрации push-токена устройства.
      required:
        - token
        - platform
      properties:
        token:
          type: string
          description: Токен push-уведомлений, выданный платформой.
        platform:
          type: string
          description: Платформа устройства.
          enum:
            - ios
            - android
          example: ios